<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Rock Paper Scissors Game</title>
  </head>
  <body>
    <header>
      <h1>Rock Paper Scissors</h1>
    </header>
    <div class="scoreboard">
      <div class="badge" id="user-label">user</div>
      <div class="badge" id="comp-label">comp</div>
      <span id="userscore">0</span>:<span id="compscore">0</span>
    </div>
    <div class="result">
      <p>Start Playing!</p>
    </div>
    <div class="choices">
      <div class="choice" id="r"><img src="fist.png" alt="Rock" /></div>
      <div class="choice" id="p"><img src="hand.png" alt="Paper" /></div>
      <div class="choice" id="s">
        <img src="letter-v.png" alt="Scissors" />
      </div>
    </div>

    <p id="action-msg">Make your move</p>
    <script src="app.js"></script>
  </body>
</html>
